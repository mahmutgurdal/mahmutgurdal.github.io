  <div class="section-header fade-in">
    <span class="section-num">01.</span>
    <h2>About</h2>
  </div>
  <div class="about-grid">
    <div class="about-body fade-in">
      <p><strong>Why do some children seem more drawn to media than others, and what shapes those differences?</strong></p>
      <p>This question sits at the center of my research. I am a Ph.D. candidate in Human Development at Virginia Tech, where I study children's media use as a window into individual differences in temperament, development, and family environments.</p>
      <p>Much of my work focuses on early childhood. I am particularly interested in how child temperament shapes patterns of media engagement and vulnerability to problematic media use. At the same time, I examine environmental influences, especially how parental behaviors — such as emotion regulation — help shape children's media experiences. In my work, I consider multiple dimensions of media use, including media interactivity. Although my work centers primarily on early childhood, I also conduct research on media use during adolescence.</p>
      <p>Beyond media, I am interested in how temperament relates not only to media use, but also to children's developmental outcomes, including social competence and learning-related behaviors.</p>
      <p>I seek to approach these questions through multiple methodological perspectives, integrating person-centered approaches, meta-analytic methods, and machine learning to better capture complexity in developmental processes.</p>
      <p>I am currently a Graduate Research Assistant in the <a href="https://kchoi.org/" target="_blank" style="color:var(--accent);text-decoration:none;border-bottom:1px solid var(--accent-light);">Cognitive Developmental Science (CoDeS) Lab</a> at Virginia Tech and expect to complete my Ph.D. in May 2027.</p>
    </div>
    <div class="about-sidebar fade-in">
      <h3>Research Interests</h3>
      <ul class="interest-list">
        <li>Media Use</li>
        <li>Problematic Media Use</li>
        <li>Temperament</li>
        <li>Self-Regulation</li>
        <li>Family and Media Environments</li>
        <li>Emotion Regulation</li>
        <li>AI and Technology in Early Learning</li>
      </ul>
    </div>
  </div>
</section>
